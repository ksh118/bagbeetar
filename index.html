<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Hub</title>

    <!-- OG / Twitter 메타 — JS가 실행되기 전 빈 상태이므로
         localStorage 캐시값을 document.write로 즉시 덮어씌움 -->
    <meta id="og-title"       property="og:title"        content="Link Hub">
    <meta id="og-description" property="og:description"  content="">
    <meta id="og-image"       property="og:image"        content="">
    <meta                     property="og:type"         content="website">
    <meta id="tw-title"       name="twitter:title"       content="Link Hub">
    <meta id="tw-description" name="twitter:description" content="">
    <meta id="tw-image"       name="twitter:image"       content="">
    <meta                     name="twitter:card"        content="summary_large_image">
    <link id="favicon-link" rel="icon" href="">

    <script>
        /* ── HTML 파싱 시점에 캐시값 즉시 적용 (깜빡임 방지 + OG 선반영) ── */
        try {
            const t  = localStorage.getItem('lh_site_title');
            const bg = localStorage.getItem('lh_loading_bg');
            const tc = localStorage.getItem('lh_loading_tc');
            const lt = localStorage.getItem('lh_loading_title');
            const fi = localStorage.getItem('lh_favicon');

            if (t) {
                document.title = t;
                /* OG title도 캐시 타이틀로 미리 세팅 */
                document.write('<sc'+'ript>document.getElementById("og-title").content="'
                    + t.replace(/"/g,'\\"') + '";document.getElementById("tw-title").content="'
                    + t.replace(/"/g,'\\"') + '";<\/sc'+'ript>');
            }
            if (fi) document.write('<link rel="icon" href="' + fi + '">');
            if (bg || tc) {
                const s = document.createElement('style');
                s.textContent = '#loading-screen{'
                    + (bg ? 'background:' + bg + '!important;' : '')
                    + '}';
                if (tc) s.textContent += '.loading-brand,.loading-desc-text{color:' + tc + '!important}';
                document.head.appendChild(s);
            }
            if (lt) document.addEventListener('DOMContentLoaded', () => {
                const el = document.getElementById('ld-brand');
                if (el) el.innerText = lt;
            });
        } catch(e) {}
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        #loading-screen {
            position: fixed; inset: 0; z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #000;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #loading-screen.fade-out { opacity: 0; transform: scale(1.04); pointer-events: none; }
        .loading-brand {
            font-size: 32px; font-weight: 800;
            letter-spacing: 0.06em; color: white;
            margin-bottom: 32px;
            font-family: -apple-system, sans-serif;
        }
        .loading-desc-text {
            font-size: 13px; color: rgba(255,255,255,0.45);
            margin-top: 20px; letter-spacing: 0.04em;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        html, body { min-height: 100%; font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #2d2d2d; }
        body { display: flex; justify-content: center; }

        #main-content { opacity: 0; width: 100%; min-height: 100vh; transition: opacity 0.5s ease 0.1s; }
        #main-content.visible { opacity: 1; }

        .wrap { width: 100%; max-width: 480px; margin: 0 auto; padding: 52px 20px 80px; text-align: center; }

        .profile { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); margin: 0 auto 20px; display: block; }
        .title { color: white; font-size: 26px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; word-break: keep-all; }
        .sub { color: rgba(255,255,255,0.6); margin-bottom: 24px; font-size: 14px; word-break: keep-all; }

        .sns-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .sns-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.13);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 22px; color: white;
            transition: transform 0.15s, background 0.15s;
            overflow: hidden; flex-shrink: 0;
        }
        .sns-btn:hover { transform: scale(1.12); filter: brightness(1.2); }
        .sns-btn img { width: 100%; height: 100%; object-fit: cover; }

        .btn {
            display: flex; align-items: center; border-radius: 14px;
            text-decoration: none; margin-bottom: 12px; font-weight: 600;
            transition: transform 0.13s, opacity 0.13s;
            overflow: hidden; min-height: 64px; width: 100%;
        }
        .btn:active { transform: scale(0.98); opacity: 0.85; }
        .btn-icon { width: 64px; height: 64px; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-icon img { width: 100%; height: 100%; object-fit: cover; }
        .btn-center { flex: 1; padding: 0 8px; text-align: center; }
        .btn-label { font-size: 16px; line-height: 1.35; }
        .btn-desc { font-size: 12px; opacity: 0.55; margin-top: 4px; }
        .btn-more { width: 36px; height: 64px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; opacity: 0.35; font-size: 18px; letter-spacing: 1px; }
        .btn-spacer-l { width: 20px; flex-shrink: 0; }

        @media (max-width: 480px) {
            .wrap { padding: 40px 12px 70px; }
            .profile { width: 110px; height: 110px; }
            .title { font-size: 22px; }
            .sub { font-size: 13px; }
            .sns-btn { width: 44px; height: 44px; font-size: 20px; }
            .btn { min-height: 60px; border-radius: 12px; }
            .btn-icon { width: 60px; height: 60px; }
            .btn-more { height: 60px; width: 32px; }
            .btn-label { font-size: 15px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-brand" id="ld-brand">Bagbeetar</div>
    <div class="spinner" id="ld-spinner"></div>
    <div class="loading-desc-text" id="ld-desc"></div>
</div>

<div id="main-content">
    <div class="wrap">
        <img id="profile-img" class="profile" src="https://via.placeholder.com/150" alt="프로필">
        <div id="title-el" class="title"></div>
        <div id="sub-el" class="sub"></div>
        <div id="sns-row" class="sns-row"></div>
        <div id="links-el"></div>
    </div>
</div>

<script>
const SB_URL = "https://teexuapywkysdetqolmy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZXh1YXB5d2t5c2RldHFvbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODc5NzMsImV4cCI6MjA5MTQ2Mzk3M30.gLDMHhO7U_KRlMjx4d7sQU6oNoAvGeNoYHJ_q8fpxKk";
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

function getContrastColor(hex) {
    if (!hex || hex.length < 7) return '#fff';
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (0.299*r + 0.587*g + 0.114*b) > 128 ? '#000' : '#fff';
}

function finishLoading() {
    const ls = document.getElementById('loading-screen');
    const mc = document.getElementById('main-content');
    ls.classList.add('fade-out');
    mc.classList.add('visible');
    setTimeout(() => ls.style.display = 'none', 700);
}

async function init() {
    try {
        const { data, error } = await sb.from('link_settings').select('*').eq('id',1).single();
        if (error) throw error;
        if (!data) { finishLoading(); return; }

        /* ── 로딩 화면 ── */
        const loadingBg = data.loading_bg || '#000000';
        const loadingTc = data.loading_text_color || '#ffffff';
        const ls = document.getElementById('loading-screen');
        ls.style.background = loadingBg;
        const ldBrand = document.getElementById('ld-brand');
        ldBrand.style.color = loadingTc;
        ldBrand.innerText = data.loading_title || 'Bagbeetar';
        const ldDesc = document.getElementById('ld-desc');
        ldDesc.innerText = data.loading_desc || '';
        ldDesc.style.color = loadingTc;
        const sp = document.getElementById('ld-spinner');
        sp.style.borderColor = loadingTc + '33';
        sp.style.borderTopColor = loadingTc;

        /* ── 파비콘 ── */
        if (data.favicon_url) {
            document.getElementById('favicon-link').href = data.favicon_url;
        }

        /* ── OG / Twitter 메타 — site_title 으로 통일 ── */
        const siteTitle = data.site_title || data.title || 'Link Hub';
        const ogImg     = data.profile_img_url || '';

        document.title = siteTitle;
        const setMeta = (id, val) => { const el=document.getElementById(id); if(el) el.setAttribute('content', val); };
        setMeta('og-title',       siteTitle);
        setMeta('og-description', '');
        setMeta('og-image',       ogImg);
        setMeta('tw-title',       siteTitle);
        setMeta('tw-description', '');
        setMeta('tw-image',       ogImg);

        /* ── 캐시 저장 (다음 새로고침 시 즉시 반영) ── */
        try {
            localStorage.setItem('lh_loading_bg',    loadingBg);
            localStorage.setItem('lh_loading_tc',    loadingTc);
            localStorage.setItem('lh_loading_title', data.loading_title || 'Bagbeetar');
            localStorage.setItem('lh_site_title',    siteTitle);
            if (data.favicon_url) localStorage.setItem('lh_favicon', data.favicon_url);
        } catch(e) {}

        /* ── 배경 ── */
        document.body.style.backgroundColor = data.bg_color || '#2d2d2d';

        /* ── 프로필 ── */
        if (data.profile_img_url) document.getElementById('profile-img').src = data.profile_img_url;
        document.getElementById('title-el').innerText = data.title || '';
        document.getElementById('sub-el').innerText   = data.subtitle || '';

        /* ── SNS 버튼 ── */
        const snsRow = document.getElementById('sns-row');
        const sns    = (data.sns_items || []).filter(s => s.enabled);
        if (sns.length === 0) {
            snsRow.style.display = 'none';
        } else {
            const snsBtnColor   = data.sns_btn_color   || '#ffffff';
            const snsBtnOpacity = data.sns_btn_opacity  != null ? data.sns_btn_opacity : 0.13;
            const r=parseInt(snsBtnColor.slice(1,3),16),
                  g=parseInt(snsBtnColor.slice(3,5),16),
                  b=parseInt(snsBtnColor.slice(5,7),16);
            const snsBg = `rgba(${r},${g},${b},${snsBtnOpacity})`;

            sns.forEach(s => {
                const a = document.createElement('a');
                if (s.url && s.url.trim()) {
                    let href = s.url.trim();
                    if (!/^https?:\/\//i.test(href)) href = 'https://' + href;
                    a.href = href; a.target = '_blank'; a.rel = 'noopener noreferrer';
                } else {
                    a.href = '#'; a.onclick = e => e.preventDefault();
                }
                a.className = 'sns-btn';
                a.style.background = snsBg;
                a.title = s.label;
                a.innerHTML = s.imgUrl
                    ? `<img src="${s.imgUrl}" alt="${s.label}">`
                    : `<i class="${s.icon}" style="color:${s.color || 'white'}"></i>`;
                snsRow.appendChild(a);
            });
        }

        /* ── 링크 버튼 ── */
        const container  = document.getElementById('links-el');
        const btnColor   = data.btn_color || '#111';
        const btnTc      = getContrastColor(btnColor);

        (data.links || []).forEach(l => {
            if (!l.text) return;
            const a = document.createElement('a');
            if (l.url && l.url.trim()) {
                let href = l.url.trim();
                if (!/^https?:\/\//i.test(href)) href = 'https://' + href;
                a.href = href; a.target = '_blank'; a.rel = 'noopener noreferrer';
            } else {
                a.href = '#'; a.onclick = e => e.preventDefault();
            }
            a.className = 'btn';
            a.style.background = btnColor;
            a.style.color = btnTc;
            a.innerHTML = l.imgUrl
                ? `<div class="btn-icon"><img src="${l.imgUrl}" alt=""></div>
                   <div class="btn-center"><div class="btn-label">${l.text}</div>${l.desc?`<div class="btn-desc">${l.desc}</div>`:''}</div>
                   <div class="btn-more">⋮</div>`
                : `<div class="btn-spacer-l"></div>
                   <div class="btn-center"><div class="btn-label">${l.text}</div>${l.desc?`<div class="btn-desc">${l.desc}</div>`:''}</div>
                   <div class="btn-more">⋮</div>`;
            container.appendChild(a);
        });

        setTimeout(finishLoading, 800);

    } catch(e) {
        console.error(e);
        finishLoading();
    }
}

init();
</script>
</body>
</html>
