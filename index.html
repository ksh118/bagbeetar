<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; justify-content: center; min-height: 100vh; transition: 0.5s; font-family: sans-serif; }
        .wrap { width: 100%; max-width: 480px; padding: 60px 20px; text-align: center; }
        .profile { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; margin-bottom: 20px; }
        .title { color: white; font-size: 24px; font-weight: bold; }
        .sub { color: rgba(255,255,255,0.8); margin-bottom: 30px; }
        .btn { display: flex; align-items: center; padding: 18px; border-radius: 15px; color: white; text-decoration: none; margin-bottom: 12px; font-weight: bold; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
    </style>
</head>
<body id="bg">
    <div class="wrap">
        <img id="img" class="profile" src="https://via.placeholder.com/150">
        <div id="title" class="title">로딩 중...</div>
        <div id="sub" class="sub"></div>
        <div id="links"></div>
    </div>

<script>
    const SB_URL = "https://teexuapywkysdetqolmy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZXh1YXB5d2t5c2RldHFvbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODc5NzMsImV4cCI6MjA5MTQ2Mzk3M30.gLDMHhO7U_KRlMjx4d7sQU6oNoAvGeNoYHJ_q8fpxKk";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function init() {
        const { data } = await supabase.from('link_settings').select('*').eq('id', 1).single();
        if(data) {
            document.getElementById('bg').style.backgroundColor = data.bg_color;
            if(data.profile_img_url) document.getElementById('img').src = data.profile_img_url;
            document.getElementById('title').innerText = data.title;
            document.getElementById('sub').innerText = data.subtitle;
            const container = document.getElementById('links');
            data.links.forEach(l => {
                container.innerHTML += `<a href="${l.url}" class="btn" style="background:${data.btn_color}"><i class="${l.icon}" style="margin-right:15px; width:20px;"></i>${l.text}</a>`;
            });
        }
    }
    init();
</script>
</body>
</html>
