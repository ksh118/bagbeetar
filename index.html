<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.5s;
            font-family: -apple-system, sans-serif;
            background: #2d2d2d;
        }
        .wrap {
            width: 100%;
            max-width: 480px;
            padding: 60px 20px 80px;
            text-align: center;
        }
        .profile {
            width: 110px; height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            margin-bottom: 18px;
        }
        .title {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .sub {
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* SNS 아이콘 */
        .sns-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .sns-icon-btn {
            width: 46px; height: 46px;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            font-size: 20px;
            color: white;
            transition: transform 0.15s, background 0.15s;
            overflow: hidden;
        }
        .sns-icon-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.22);
        }
        .sns-icon-btn img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 링크 버튼 */
        .btn {
            display: flex;
            align-items: center;
            padding: 0;
            border-radius: 14px;
            text-decoration: none;
            margin-bottom: 12px;
            font-weight: 600;
            transition: transform 0.15s, opacity 0.15s;
            overflow: hidden;
            min-height: 58px;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-img {
            width: 58px; height: 58px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 0;
        }
        .btn-icon {
            width: 58px; height: 58px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
            background: rgba(0,0,0,0.15);
        }
        .btn-text {
            flex: 1;
            text-align: center;
            font-size: 15px;
            padding: 0 16px;
        }
    </style>
</head>
<body id="bg">
<div class="wrap">
    <img id="profile-img" class="profile" src="https://via.placeholder.com/150" alt="프로필">
    <div id="title" class="title">로딩 중...</div>
    <div id="sub" class="sub"></div>
    <div id="sns-row" class="sns-row"></div>
    <div id="links"></div>
</div>

<script>
const SB_URL = "https://teexuapywkysdetqolmy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZXh1YXB5d2t5c2RldHFvbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODc5NzMsImV4cCI6MjA5MTQ2Mzk3M30.gLDMHhO7U_KRlMjx4d7sQU6oNoAvGeNoYHJ_q8fpxKk";
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// 버튼색 기반 텍스트 색 자동 계산
function getContrastColor(hex) {
    if (!hex || hex.length < 7) return '#ffffff';
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const lum = 0.299*r + 0.587*g + 0.114*b;
    return lum > 128 ? '#000000' : '#ffffff';
}

async function init() {
    try {
        const { data, error } = await sb.from('link_settings').select('*').eq('id',1).single();
        if (error) throw error;
        if (!data) return;

        // 배경
        document.getElementById('bg').style.backgroundColor = data.bg_color || '#2d2d2d';

        // 프로필
        if (data.profile_img_url) document.getElementById('profile-img').src = data.profile_img_url;
        document.getElementById('title').innerText = data.title || '';
        document.getElementById('sub').innerText = data.subtitle || '';

        // SNS 아이콘
        const snsRow = document.getElementById('sns-row');
        snsRow.innerHTML = '';
        const sns = (data.sns_items || []).filter(s => s.enabled && s.url);
        sns.forEach(s => {
            const a = document.createElement('a');
            a.href = s.url;
            a.className = 'sns-icon-btn';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            if (s.imgUrl) {
                a.innerHTML = `<img src="${s.imgUrl}" alt="${s.label}">`;
            } else {
                a.innerHTML = `<i class="${s.icon}"></i>`;
            }
            snsRow.appendChild(a);
        });
        if (sns.length === 0) snsRow.style.display = 'none';

        // 링크 버튼
        const container = document.getElementById('links');
        container.innerHTML = '';
        const btnColor = data.btn_color || '#111111';
        const textColor = getContrastColor(btnColor);

        (data.links || []).forEach(l => {
            if (!l.text && !l.url) return;
            const a = document.createElement('a');
            a.href = l.url || '#';
            a.className = 'btn';
            a.style.background = btnColor;
            a.style.color = textColor;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';

            if (l.imgUrl) {
                a.innerHTML = `
                    <img class="btn-img" src="${l.imgUrl}" alt="">
                    <span class="btn-text">${l.text}</span>
                    <div style="width:58px"></div>
                `;
            } else {
                a.innerHTML = `<span class="btn-text">${l.text}</span>`;
                a.style.justifyContent = 'center';
                a.style.padding = '18px';
            }
            container.appendChild(a);
        });

    } catch(e) {
        console.error(e);
        document.getElementById('title').innerText = '오류 발생';
    }
}

init();
</script>
</body>
</html>
