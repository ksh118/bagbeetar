<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.5s;
            font-family: sans-serif;
            background: #4a4a00;
        }
        .wrap {
            width: 100%;
            max-width: 480px;
            padding: 60px 20px;
            text-align: center;
        }
        .profile {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }
        .title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .sub {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: flex;
            align-items: center;
            padding: 18px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            margin-bottom: 12px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }
        .loading {
            color: rgba(255,255,255,0.6);
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body id="bg">
    <div class="wrap">
        <img id="img" class="profile" src="https://via.placeholder.com/150" alt="profile">
        <div id="title" class="title">로딩 중...</div>
        <div id="sub" class="sub"></div>
        <div id="links"><p class="loading">링크를 불러오는 중...</p></div>
    </div>

<script>
    const SB_URL = "https://teexuapywkysdetqolmy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZXh1YXB5d2t5c2RldHFvbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODc5NzMsImV4cCI6MjA5MTQ2Mzk3M30.gLDMHhO7U_KRlMjx4d7sQU6oNoAvGeNoYHJ_q8fpxKk";

    // ✅ 수정: supabase 네임스페이스에서 createClient 꺼내서 사용
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);

    async function init() {
        try {
            const { data, error } = await sb
                .from('link_settings')
                .select('*')
                .eq('id', 1)
                .single();

            if (error) throw error;

            if (data) {
                // 배경색 적용
                document.getElementById('bg').style.backgroundColor = data.bg_color || '#4a4a00';

                // 프로필 이미지
                if (data.profile_img_url) {
                    document.getElementById('img').src = data.profile_img_url;
                }

                // 텍스트
                document.getElementById('title').innerText = data.title || '링크 허브';
                document.getElementById('sub').innerText = data.subtitle || '';

                // 링크 렌더링
                const container = document.getElementById('links');
                container.innerHTML = '';

                const links = data.links || [];
                if (links.length === 0) {
                    container.innerHTML = '<p class="loading">등록된 링크가 없습니다.</p>';
                    return;
                }

                links.forEach(l => {
                    const a = document.createElement('a');
                    a.href = l.url || '#';
                    a.className = 'btn';
                    a.style.background = data.btn_color || '#000';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.innerHTML = `<i class="${l.icon || 'fa fa-link'}"></i>${l.text || '링크'}`;
                    container.appendChild(a);
                });
            }
        } catch (err) {
            console.error('데이터 로드 실패:', err);
            document.getElementById('title').innerText = '오류 발생';
            document.getElementById('links').innerHTML = '<p class="loading">데이터를 불러올 수 없습니다.</p>';
        }
    }

    init();
</script>
</body>
</html>
